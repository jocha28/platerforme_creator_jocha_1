app = "jocha-music"
primary_region = "cdg"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  AUDIO_DIR = "/data/audio"
  COVERS_DIR = "/data/covers"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "jocha_audio"
  destination = "/data"
